rubrics:
  Strategy:
    notes: |
      Strategy = multi-card carousel post explaining a trading strategy, pattern, indicator, or technique.
      Structure: 7 explanation cards + 1 closing card (with IG & FB variants) + FB/IG/TG post captions.
      Voice: educational but accessible, concrete examples, not overly technical.
      Each card: one clear concept, max 2-3 short paragraphs per card.
      Cards typically cover: concept definition, how it works, setup/trigger, example, pros/cons, tips, pitfalls.
      Closing card (Card 8): CTA variants for IG (save/tap CTA) and FB (like/comment CTA).
      Channel captions (IG, FB, TG) are longer narrative versions of the carousel content.
      Compliance: no guaranteed profit claims, no "always wins" language.

  Glossary:
    notes: |
      Glossary = single-image post defining one trading term.
      Format: image with the term + short explanation, plus channel captions.
      Keep definitions simple and concrete. One clear analogy or example is better than a dry textbook definition.
      Voice: friendly educator, not formal academic.
      Channel captions:
      - IG/FB: full definition + example + short CTA
      - TG: same, optimized for readable-in-chat length
      - Button: short CTA text ("Try now", "Learn more")
      No guaranteed profit language.

  UGC:
    notes: |
      UGC = TikTok short-form videos. Produce TWO pieces of copy per video:
      1. Cover — the short hook text shown on the video thumbnail / first frame.
         Usually 3–8 words, with one or two emoji. Should stop the scroll.
         Examples: "Waiting for a sign? 📦", "They lied to you 👀", "Daily routine of a trader boyfriend 📱☕"
      2. Caption — the post caption below the video.
         Usually 1–3 short lines. Separate paragraph breaks by using the literal text " | " (space-pipe-space) INSIDE the same string.
         Always eke "Tap 💚 if ...".
         Voice: first-person or second-person, conversational, meme-aware, playful.
         Topics often reference partner/friend/couple dynamics, relatable trader habits.
      Per-video guidance:
      - Each video block in the brief (`*Видео 1.*`, `*Видео 2.*`, etc.) includes a "Подводка к посту" (caption direction) and a "Пример" (example reel with a sample caption).
      - Use the caption direction as the functional goal for that video (e.g. "Шутка + ста на лайк" = joke + like CTA).
      - Use the `Пример` as a voice anchor — match its rhythm, tone, and emoji density, NOT its literal content.
      - Do not invent script narrative content that isn't in the brief (the actual video script lives in a linked Google Doc the agent can't access).
      - If the brief only supplies the caption direction and example, produce Cover + Caption that fit the video concept — that is the only output needed.
      Compliance: no guaranteed put responsible.

  First steps in trading:
    notes: |
      First steps in trading = educational content for beginners about platform features and trading basics.

      FORMAT CHOICE — IMPORTANT:
      DEFAULT to CAROUSEL (multi-card) format. Do NOT leave Cards 2-5 empty unless the topic is trivially simple.
      If the topic has 3+ distinct beats (mechanics, steps, types, examples, tips), it MUST be a carousel.

      CAROUSEL structure (use this in 90% of cases):
      - Image Title: hook on card 1 + "Insights from Olymptrade expert José Coelho" (or "Tips from our expert José Coelho")
      - Card 2: first main concept / first mechanic / first tip (2-4 short lines, one emoji)
      - Card 3: second concept / second mechanic / concrete example (2-4 short lines, one emoji)
      - Card 4: third concept / summary / why-it-matters (2-4 short lines, one emoji)
      - Card 5 (IG): closing card with "📌 Save for later" / "Save to come back to" CTA
      - Card 5 (FB): closing card with "Like for more like this" CTA
      - FB Post, IG Post, TG Post: full narrative versions (800-1500 chars), longer than cards
      - Button: short CTA ("Try now", "Open chart", "Learn more")

      SINGLE-IMAGE structure (rare — only when the topic is one clean idea):
      - Image Title: hook + expert credit
      - Card 2-5: leave empty
      - FB/IG/TG Post: full content
      - Button: CTA

      Card writing rules:
      - ONE clear micro-point per card.
      - Scannable: short lines, one concept, a concrete example or number if relevant.
      - Don't stuff a full post into a card. Cards are visual-first; posts are the long read.

      Voice: conversational, friendly, concrete. Rewrite expert source text in livelier, more social-media-native tone.

      Personalization: always credit Olymptrade expert (usually "José Coelho") in Image Title and naturally in posts.

      Channel CTAs:
      - FB: "Like if this helped"
      - IG: "📌 Save for later"
      - TG: reactions + button label

      Emojis allowed wexamples use them (🟢 📍 ⏱️ 📌 💡 📊 🔍). No guaranteed-profit language.
